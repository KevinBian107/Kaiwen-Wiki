<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b68ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" />
  <!-- Neural network nodes -->
  <!-- Left layer -->
  <circle cx="130" cy="180" r="18" fill="white" opacity="0.9"/>
  <circle cx="130" cy="256" r="18" fill="white" opacity="0.9"/>
  <circle cx="130" cy="332" r="18" fill="white" opacity="0.9"/>
  <!-- Middle layer -->
  <circle cx="256" cy="156" r="20" fill="white" opacity="0.95"/>
  <circle cx="256" cy="256" r="22" fill="white"/>
  <circle cx="256" cy="356" r="20" fill="white" opacity="0.95"/>
  <!-- Right layer -->
  <circle cx="382" cy="200" r="18" fill="white" opacity="0.9"/>
  <circle cx="382" cy="312" r="18" fill="white" opacity="0.9"/>
  <!-- Connections left to middle -->
  <line x1="148" y1="180" x2="236" y2="156" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="148" y1="180" x2="236" y2="256" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <line x1="148" y1="256" x2="236" y2="156" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <line x1="148" y1="256" x2="236" y2="256" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="148" y1="256" x2="236" y2="356" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <line x1="148" y1="332" x2="236" y2="256" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <line x1="148" y1="332" x2="236" y2="356" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <!-- Connections middle to right -->
  <line x1="276" y1="156" x2="364" y2="200" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="276" y1="156" x2="364" y2="312" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <line x1="278" y1="256" x2="364" y2="200" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="278" y1="256" x2="364" y2="312" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="276" y1="356" x2="364" y2="200" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <line x1="276" y1="356" x2="364" y2="312" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <!-- Center node inner detail - sigma symbol -->
  <text x="256" y="264" font-family="serif" font-size="28" fill="#4a90d9" text-anchor="middle" dominant-baseline="middle" font-style="italic">&#x03A3;</text>
  <!-- "K" initial subtly in top-left node -->
  <text x="130" y="186" font-family="sans-serif" font-size="16" fill="#4a90d9" text-anchor="middle" dominant-baseline="middle" font-weight="bold">K</text>
  <!-- "W" in bottom-left node -->
  <text x="130" y="338" font-family="sans-serif" font-size="14" fill="#4a90d9" text-anchor="middle" dominant-baseline="middle" font-weight="bold">W</text>
</svg>
